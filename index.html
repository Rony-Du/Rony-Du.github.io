<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🌸 校园恋爱存储器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 顶部：在一起天数 -->
    <header>
      <h1>💗 我们的校园恋爱</h1>
      <p id="days-counter">已在一起 <span id="days">--</span> 天 🎓</p>
    </header>

    <!-- 实时聊天 -->
    <section class="panel">
      <h2>💬 悄悄话（实时）</h2>
      <div id="chat-box"></div>
      <div class="input-row">
        <select id="sender">
          <option value="TA">TA</option>
          <option value="我">我</option>
        </select>
        <input id="msg-input" placeholder="输入想说的话…" />
        <button onclick="sendMsg()">发送</button>
      </div>
      <p id="presence">🔵 等待连接…</p>
    </section>

    <!-- 恋爱记忆 -->
    <section class="panel">
      <h2>📖 恋爱存储器（云端保存）</h2>
      <input id="mem-title" placeholder="标题：第一次牵手…" />
      <textarea id="mem-content" placeholder="记录这一刻…"></textarea>
      <select id="mem-mood">
        <option value="😊">😊 开心</option>
        <option value="🥺">🥺 感动</option>
        <option value="💕">💕 甜蜜</option>
      </select>
      <button onclick="saveMemory()">存入记忆</button>
      <div id="mem-list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
